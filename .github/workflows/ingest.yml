name: Ingest paving schedule

# The city publishes a rolling "this week / past week" Google Sheet and drops
# older weeks. This job pulls it on a schedule and commits any new dated rows to
# data/archive.json so the history accumulates. It also refreshes the geocode
# cache so historical rows keep their map positions.

on:
  schedule:
    # Daily at 11:00 UTC (~7am ET). Commits only happen when the data changed,
    # so running daily just makes sure mid-week edits aren't missed.
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Ingest sheet into archive + refresh geocode cache
        run: npm run ingest

      - name: Commit any new data
        run: |
          if [[ -n "$(git status --porcelain data/archive.json data/geocode-cache.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/archive.json data/geocode-cache.json
            git commit -m "data: ingest paving schedule ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No schedule changes to commit."
          fi
